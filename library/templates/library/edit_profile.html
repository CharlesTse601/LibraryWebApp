{% extends 'library/base.html' %}
{% load static %}
{% block content %}

<style>
  .edit-prof-wrap {
    max-width: 480px;
    margin: 2rem auto;
    border: 1px solid #ccc;
    padding: 2rem;
    background: #fff;
  }

  .edit-prof-wrap h1 {
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 1.5rem;
    border-bottom: 2px solid #111;
    padding-bottom: 0.6rem;
  }

  .edit-prof-field {
    display: flex;
    flex-direction: column;
    margin-bottom: 1rem;
  }

  .edit-prof-field label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #555;
    margin-bottom: 0.3rem;
  }

  .edit-prof-field input {
    padding: 0.65rem 0.75rem;
    border: 1px solid #ccc;
    font-size: 0.9rem;
    background: #f9f9f9;
    color: #111;
    width: 100%;
    box-sizing: border-box;
  }

  .edit-prof-field input:focus {
    outline: none;
    border-color: #111;
    background: #fff;
  }

  .edit-prof-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    align-items: center;
  }

  .edit-prof-save {
    padding: 0.7rem 1.75rem;
    background: #111;
    color: #fff;
    border: none;
    font-weight: 700;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    cursor: pointer;
  }

  .edit-prof-save:hover {
    background: #333;
  }

  .edit-prof-cancel {
    padding: 0.7rem 1.5rem;
    background: #fff;
    color: #111;
    border: 1.5px solid #111;
    font-weight: 700;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    text-decoration: none;
    display: inline-block;
  }

  .edit-prof-cancel:hover {
    background: #eee;
  }

  .edit-prof-messages {
    margin-top: 1rem;
  }

  .edit-prof-messages p {
    font-size: 0.85rem;
    padding: 0.6rem 0.75rem;
    background: #f0f0f0;
    border-left: 3px solid #c0392b;
    margin: 0 0 0.5rem;
    color: #111;
  }

  .edit-prof-divider {
    border: none;
    border-top: 1px solid #e0e0e0;
    margin: 1.25rem 0;
  }

  .edit-prof-section-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
    margin-bottom: 0.75rem;
  }
</style>

<div class="edit-prof-wrap">
  <h1>Edit Profile</h1>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="edit-prof-section-label">Account</div>

    <div class="edit-prof-field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" value="{{ user.username }}">
    </div>

    <div class="edit-prof-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ user.email }}">
    </div>

    <div class="edit-prof-field">
      <label for="avatar">Profile Picture</label>
      <input type="file" id="avatar" name="avatar" accept="image/*">
    </div>

    <hr class="edit-prof-divider">

    <div class="edit-prof-section-label">Change Password</div>

    <div class="edit-prof-field">
      <label for="password1">New Password</label>
      <input type="password" id="password1" name="password1" placeholder="Leave blank to keep current">
    </div>

    <div class="edit-prof-field">
      <label for="password2">Confirm New Password</label>
      <input type="password" id="password2" name="password2" placeholder="Leave blank to keep current">
    </div>

    <div class="edit-prof-actions">
      <button type="submit" class="edit-prof-save">Save Changes</button>
      <a href="{% url 'library:profile' %}" class="edit-prof-cancel">Cancel</a>
    </div>
  </form>

  {% if messages %}
    <div class="edit-prof-messages">
      {% for message in messages %}
        <p>{{ message }}</p>
      {% endfor %}
    </div>
  {% endif %}
</div>

{% endblock %}
