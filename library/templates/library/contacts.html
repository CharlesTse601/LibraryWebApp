{% extends 'library/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/contacts.css' %}">
{% endblock %}

{% block title %}Contact Us — LibraryWebApp{% endblock %}

{% block content %}
<p><a href="{% url 'library:browse' %}">Browse</a> &rsaquo; <strong>Contact Us</strong></p>

<div class="contacts-wrap">
    <h1>Contact Us</h1>

    <p>Get in touch with the LibraryWebApp team.</p>

    <form method="POST" action="{% url 'library:contacts' %}">
        {% csrf_token %}

        <div class="contacts-section-label">Account</div>

        <div class="contacts-field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name">
        </div>

        <div class="contacts-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com">
        </div>

        <hr class="contacts-divider">

        <div class="contacts-section-label">Message to us</div>

        <div class="contacts-field">
            <label for="message">Message</label>
            <input type="text" id="message" name="message" placeholder="Your message...">
        </div>

        <div class="contacts-actions">
            <button type="submit" class="contacts-send">Send Message</button>
        </div>
    </form>
</div>
{% endblock %}
